on:
  workflow_dispatch:
  pull_request:
    paths: &paths
      - Dockerfile
  push:
    branches:
      - master
    paths: *paths

name: docker-image

env:
  IMAGE: ghcr.io/vjik/my-prompts-mcp-dev
  VERSION: 1

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0

      - name: Log in to GitHub Container Registry
        #if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.description=Docker image for development of My Prompts MCP.
            org.opencontainers.image.title=my-prompts-mcp-dev
            org.opencontainers.image.version=${{ env.VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true # ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
