on:
  pull_request:
  release:
    types: [published]

name: build-windows-release

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: windows-2025
          - arch: arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Set a binary name
        run: echo "BINARY_NAME=my-prompts-mcp-${{ github.event.release.tag_name }}-windows-${{ matrix.arch }}.exe" >> $GITHUB_ENV
        shell: bash

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build binary
        env:
          BINARY_NAME: ${{ env.BINARY_NAME }}
        run: .github/workflows/build-windows-release.ps1
        shell: pwsh

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "test-tag" build/${{ env.BINARY_NAME }} --clobber
        shell: bash
