on:
  pull_request:
  release:
    types: [published]

name: build-macos-release

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer

      - name: Set a binary name
        run: echo "BINARY_NAME=my-prompts-mcp-${{ github.event.release.tag_name }}-macos-${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build binary
        env:
          BINARY_NAME: ${{ env.BINARY_NAME }}
        run: bash .github/workflows/build-macos-release.sh

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "test-tag" build/${{ env.BINARY_NAME }} --clobber
