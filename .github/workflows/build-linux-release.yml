on:
  release:
    types: [published]

name: build-linux-release

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-latest-arm64-2core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build binary
        run: tools/build-binary.sh

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/my-prompts-mcp#my-prompts-mcp-linux-${{ matrix.arch }}
