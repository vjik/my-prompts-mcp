on:
  pull_request:
  release:
    types: [published]

name: build-linux-release

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-latest-arm64-2core
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build binary
        run: tools/build-binary.sh

      - name: Rename binary
        run: |
          BINARY_NAME=my-prompts-mcp-${{ github.event.release.tag_name }}-linux-${{ matrix.arch }}
          mv build/my-prompts-mcp build/$BINARY_NAME
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "test-tag" build/${{ env.BINARY_NAME }}
